<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Готовый лендинг на Flexbox</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <div class="logo">MyLogo</div>
        <nav class="nav">
            <a href="">Главная</a>
            <a href="">О нас</a>
            <a href="">Услуги</a>
            <a href="">Контакты</a>
        </nav>
    </header>

    <section class="hero">
        <h1>Добро пожаловать на наш лендинг!</h1>
        <p>Красивый заголовок с описанием продукта или услуги</p>
        <button>Подробнее</button>
    </section>

    <section class="cards">
        <div class="card">Карточка 1</div>
        <div class="card">Карточка 2</div>
        <div class="card">Карточка 3</div>
        <div class="card">Карточка 4</div>
        <div class="card">Карточка 5</div>
        <div class="card">Карточка 6</div>
    </section>

    <footer class="footer">
        <p>2026 Все права защищены</p>
    </footer>
</body>
</html>
